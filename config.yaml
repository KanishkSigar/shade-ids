# SHADE-IDS configuration (paths, split, model params).

data:
  train_csv: data/UNSW_NB15_training-set.csv
  test_csv:  data/UNSW_NB15_testing-set.csv
  label_col: label
  attack_cat_col: attack_cat
  drop_cols: [id]

split:
  test_size: 0.2
  random_state: 42
  scaler: standard

models:
  random_forest:
    n_estimators: 200
    n_jobs: -1
    random_state: 42
  xgboost:
    n_estimators: 300
    max_depth: 6
    tree_method: hist
    random_state: 42

output:
  results_dir: results
